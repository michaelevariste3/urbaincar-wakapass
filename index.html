<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbain Car - WakaPass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B1F3A; color: white; padding: 15px; }
        h1 { color: #FF7A00; text-align: center; margin-bottom: 15px; font-size: 1.5rem; }
        .card { background: #1E2F4B; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .company-card { background: linear-gradient(135deg, #FF7A00, #FF9F3D); color: #0B1F3A; cursor: pointer; transition: transform 0.2s; }
        .company-card:hover { transform: translateY(-5px); }
        .companies-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .company-logo { font-size: 3rem; text-align: center; }
        .company-name { text-align: center; font-weight: bold; margin-top: 10px; }
        button { background: #FF7A00; color: #0B1F3A; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-danger { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <h1>🚍 URBAIN CAR / WAKAPASS</h1>
    
    <div class="card">
        <h2>🏢 Accès Compagnies de Transport</h2>
        <p>Chaque compagnie dispose de son propre espace de gestion</p>
    </div>
    
    <div class="companies-grid" id="companiesGrid"></div>
    
    <div class="card" style="text-align: center;">
        <button onclick="location.href='index.html'">🚌 Retour à l'accueil</button>
        <button onclick="location.href='company-dashboard.html?company=UTB'" class="btn-danger">🔐 Accès Admin</button>
    </div>

    <script>
        const companies = [
            { name: 'UTB', logo: '🚌', color: '#FF7A00', description: 'Transport interurbain' },
            { name: 'TSR', logo: '🚍', color: '#17a2b8', description: 'Voyages confortables' },
            { name: 'AFT', logo: '🚐', color: '#28a745', description: 'Express rapide' },
            { name: 'SAMA', logo: '🚎', color: '#6f42c1', description: 'Transport SAMA' },
            { name: 'Ocean CI', logo: '⛴️', color: '#20c997', description: 'Lignes côtières' }
        ];
        
        const grid = document.getElementById('companiesGrid');
        grid.innerHTML = companies.map(company => `
            <div class="card company-card" onclick="location.href='company-dashboard.html?company=${company.name}'" style="background: ${company.color};">
                <div class="company-logo">${company.logo}</div>
                <div class="company-name">${company.name}</div>
                <div style="font-size: 12px; text-align: center; margin-top: 5px;">${company.description}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
