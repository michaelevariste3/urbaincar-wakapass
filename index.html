<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbain Car - WakaPass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0B1F3A; color: white; padding: 20px; }
        h1 { color: #FF7A00; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; margin-bottom: 30px; opacity: 0.8; }
        .companies-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .company-card { background: linear-gradient(135deg, #1E2F4B, #2A3F5F); border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .company-card:hover { transform: translateY(-10px); background: linear-gradient(135deg, #FF7A00, #FF9F3D); }
        .company-logo { font-size: 4rem; margin-bottom: 15px; }
        .company-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .company-desc { font-size: 0.85rem; opacity: 0.8; }
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #2A3F5F; }
        .btn { background: #FF7A00; color: #0B1F3A; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        @media (max-width: 768px) { .companies-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>🚍 URBAIN CAR / WAKAPASS</h1>
    <div class="subtitle">Solution digitale de transport en Côte d'Ivoire</div>
    
    <div class="companies-grid" id="companiesGrid"></div>
    
    <div class="footer">
        <button class="btn" onclick="location.href='index.html'">🏠 Accueil</button>
        <button class="btn" onclick="location.href='company-dashboard.html?company=UTB'">🔐 Accès Admin</button>
    </div>

    <script>
        const companies = [
            { name: 'UTB', logo: '🚌', desc: 'Transport interurbain de qualité' },
            { name: 'TSR', logo: '🚍', desc: 'Voyages confortables et ponctuels' },
            { name: 'AFT', logo: '🚐', desc: 'Express rapide vers toutes les villes' },
            { name: 'SAMA', logo: '🚎', desc: 'SAMA Transport - La référence' },
            { name: 'Ocean CI', logo: '⛴️', desc: 'Lignes côtières et intérieures' }
        ];
        
        const grid = document.getElementById('companiesGrid');
        grid.innerHTML = companies.map(company => `
            <div class="company-card" onclick="location.href='company-dashboard.html?company=${company.name}'">
                <div class="company-logo">${company.logo}</div>
                <div class="company-name">${company.name}</div>
                <div class="company-desc">${company.desc}</div>
            </div>
        `).join('');
    </script>
</body>
</html>
